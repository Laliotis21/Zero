<!DOCTYPE html>
<!--
  ZERØ — Legal index. Static, self-contained, no external resources.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <title>ZERØ — Legal</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: #0B0C10;
      color: #E6E8EC;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      font-size: 17px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-text-size-adjust: 100%;
    }
    .wrap { max-width: 480px; padding: 32px 24px; width: 100%; }
    h1 { font-size: 40px; margin: 0 0 4px; color: #FFFFFF; letter-spacing: -0.5px; }
    p { color: #8A909C; margin: 0 0 28px; }
    a.card {
      display: block;
      text-decoration: none;
      border: 1px solid #2A2E37;
      background: #14161C;
      border-radius: 12px;
      padding: 16px 18px;
      margin: 12px 0;
      color: #E6E8EC;
      font-weight: 600;
    }
    a.card span { display: block; font-weight: 400; font-size: 14px; color: #8A909C; margin-top: 2px; }
    a.card:active { background: #1B1E26; }
    footer { margin-top: 24px; font-size: 13px; color: #6B7280; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>ZERØ</h1>
    <p>Salary &amp; tax net-income calculator. Legal documents.</p>

    <a class="card" href="privacy.html">
      Privacy Policy
      <span>What we collect and how it is used.</span>
    </a>
    <a class="card" href="terms.html">
      Terms of Service
      <span>Estimates only — not financial or tax advice.</span>
    </a>

    <footer>Contact: laliotisnikos4@gmail.com</footer>
  </div>
</body>
</html>
